<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 700;
        }
        p {
            font-size: 1.5rem;
            margin: 1rem 0 0 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[Project Name]</h1>
        <p>Screenshot Placeholder</p>
    </div>
</body>
</html>

<!-- 
To create placeholder images:
1. Open this file in a browser
2. Change [Project Name] to the project name
3. Take a screenshot
4. Save as: bazaarghost-screenshot.png, shaderweb-screenshot.png, etc.

Or use imagemagick:
convert -size 1920x1080 -background '#667eea' -fill white -gravity center -font Arial -pointsize 72 label:'BazaarGhost\nScreenshot Placeholder' bazaarghost-screenshot.png
-->
